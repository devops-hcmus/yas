name: sampledata service ci

on:
    push:
        branches: ["main"]
        paths:
            - "sampledata/**"
            - ".github/workflows/actions/action.yaml"
            - ".github/workflows/sampledata-ci.yaml"
            - "pom.xml"
    pull_request:
        branches: ["main"]
        paths:
            - "sampledata/**"
            - ".github/workflows/actions/action.yaml"
            - ".github/workflows/sampledata-ci.yaml"
            - "pom.xml"
    workflow_dispatch:

jobs:
    Build:
        runs-on: ubuntu-latest
        permissions:
            checks: write
            contents: read
            packages: write
        env:
            FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
            - uses: ./.github/workflows/actions
            - name: Run Maven Build Command
              run: mvn clean install -pl sampledata -am
            - name: Run Maven Checkstyle
              if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
              run: mvn checkstyle:checkstyle -pl sampledata -am -Dcheckstyle.output.file=sampledata-checkstyle-result.xml
            - name: Upload Checkstyle Result
              if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
              uses: jwgmeligmeyling/checkstyle-github-action@master
              with:
                  path: "**/sampledata-checkstyle-result.xml"
            - name: Analyze with sonar cloud
              if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f sampledata
            - name: Run Snyk to check for vulnerabilities
              if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
              uses: snyk/actions/maven@master
              continue-on-error: true # Giúp pipeline tiếp tục chạy để build Docker dù Snyk có phát hiện lỗ hổng
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  command: monitor
                  args: --file=${{ github.workflow }}/pom.xml --project-name=yas-${{ github.workflow }}
            - name: Build Docker image (PR check)
              if: ${{ github.event_name == 'pull_request' }}
              uses: docker/build-push-action@v6
              with:
                  context: ./sampledata
                  push: false
                  tags: ghcr.io/danzgne/yas-sampledata:latest
            - name: Log in to the Container registry
              if: ${{ github.ref == 'refs/heads/main' }}
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and push Docker images
              if: ${{ github.ref == 'refs/heads/main' }}
              uses: docker/build-push-action@v6
              with:
                  context: ./sampledata
                  push: true
                  tags: ghcr.io/danzgne/yas-sampledata:latest
