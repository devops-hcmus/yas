name: backoffice-bff service ci

on:
  push:
    branches: [ "**" ]
    paths:
      - "backoffice-bff/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/backoffice-bff-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "backoffice-bff/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/backoffice-bff-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: ./.github/workflows/actions
      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -f backoffice-bff -Dcheckstyle.output.file=backoffice-bff-checkstyle-result.xml
      - name: Upload Checkstyle Result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/backoffice-bff-checkstyle-result.xml'
      - name: Run Maven Verify
        run: mvn clean verify -f backoffice-bff
      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f backoffice-bff
      - name: Setup Snyk CLI  
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: snyk/actions/setup@master
      - name: Fix All Execute Permissions
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: chmod -R +x . || true
      - name: Run Snyk to check for vulnerabilities
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        working-directory: backoffice-bff
        continue-on-error: true
        env:
            SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
            snyk config set org=giahuytechie
            snyk monitor --file=pom.xml --project-name=yas-backoffice-bff -- -U

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions
      - name: Get commit ID
        id: commit
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            COMMIT_ID=$(git rev-parse --short ${{ github.event.pull_request.head.sha }})
          else
            COMMIT_ID=$(git rev-parse --short ${{ github.sha }})
          fi
          echo "commit_id=${COMMIT_ID}" >> "$GITHUB_OUTPUT"
      - name: Build Maven package for Docker
        run: mvn clean package -DskipTests -pl backoffice-bff -am
      - name: Build Docker image (PR check)
        if: ${{ github.event_name == 'pull_request' }}
        uses: docker/build-push-action@v6
        with:
          context: ./backoffice-bff
          push: false
          tags: ghcr.io/devops-hcmus/yas-backoffice-bff:latest
      - name: Log in to Docker Hub
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      - name: Build and push Docker image to Docker Hub (all branches with commit ID)
        if: ${{ github.event_name == 'push' }}
        uses: docker/build-push-action@v6
        with:
          context: ./backoffice-bff
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/yas-backoffice-bff:${{ steps.commit.outputs.commit_id }}
      - name: Build and push Docker image to Docker Hub (main branch with latest tag)
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
        uses: docker/build-push-action@v6
        with:
          context: ./backoffice-bff
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/yas-backoffice-bff:latest
  ci-pass:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: ${{ always() }}
    steps:
      - name: Verify all required jobs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "test=${{ needs.test.result }}, build=${{ needs.build.result }}"
            exit 1
          fi
