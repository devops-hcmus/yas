name: customer service ci

on:
  push:
    branches: [ "**" ]
    paths:
      - "customer/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/customer-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "customer/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/customer-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean install -pl customer -am
      - name: Setup Snyk CLI
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: snyk/actions/setup@master
      - name: Fix All Execute Permissions
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: chmod -R +x . || true
      - name: Run Snyk to check for vulnerabilities
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        working-directory: customer
        continue-on-error: true
        env:
            SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
            snyk config set org=giahuytechie
            snyk monitor --file=pom.xml --project-name=yas-customer -- -U
      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -pl customer -am -Dcheckstyle.output.file=customer-checkstyle-result.xml
      - name: Upload Checkstyle Result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/customer-checkstyle-result.xml'
      - name: Detect test report files
        id: test_reports
        run: |
          if find customer -type f -path '*-reports/TEST*.xml' | head -n 1 | grep -q .; then
            echo "has_reports=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && steps.test_reports.outputs.has_reports == 'true' && (success() || failure()) }}
        with:
          name: Customer-Service-Unit-Test-Results
          path: "customer/**/*-reports/TEST*.xml"
          reporter: java-junit
      - name: Add coverage report to PR
        id: jacoco
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        with:
          paths: ${{github.workspace}}/customer/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: 'Customer Coverage Report'
          update-comment: true

      - name: Enforce minimum coverage threshold
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: |
          overall="${{ steps.jacoco.outputs.coverage-overall }}"
          echo "Current overall coverage: ${overall}%"
          if [ -z "$overall" ]; then
            echo "Unable to read JaCoCo overall coverage output."
            exit 1
          fi
          awk "BEGIN {exit !($overall >= 70)}" || {
            echo "Coverage check failed: overall coverage ${overall}% is below 70%."
            exit 1
          }

      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f customer
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions
      - name: Get commit ID
        id: commit
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            COMMIT_ID=$(git rev-parse --short ${{ github.event.pull_request.head.sha }})
          else
            COMMIT_ID=$(git rev-parse --short ${{ github.sha }})
          fi
          echo "commit_id=${COMMIT_ID}" >> "$GITHUB_OUTPUT"
      - name: Build Maven package for Docker
        run: mvn clean package -DskipTests -pl customer -am
      - name: Build Docker image (PR check)
        if: ${{ github.event_name == 'pull_request' }}
        uses: docker/build-push-action@v6
        with:
          context: ./customer
          push: false
          tags: ghcr.io/devops-hcmus/yas-customer:latest
      - name: Log in to Docker Hub
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      - name: Build and push Docker image to Docker Hub (all branches with commit ID)
        if: ${{ github.event_name == 'push' }}
        uses: docker/build-push-action@v6
        with:
          context: ./customer
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/yas-customer:${{ steps.commit.outputs.commit_id }}
      - name: Build and push Docker image to Docker Hub (main branch with latest tag)
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
        uses: docker/build-push-action@v6
        with:
          context: ./customer
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/yas-customer:latest
  ci-pass:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: ${{ always() }}
    steps:
      - name: Verify all required jobs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "test=${{ needs.test.result }}, build=${{ needs.build.result }}"
            exit 1
          fi
