name: {{SERVICE_NAME}} service ci

on:
  push:
    branches: [ "**" ]
    paths:
      - "{{SERVICE_NAME}}/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/{{SERVICE_NAME}}-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "{{SERVICE_NAME}}/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/{{SERVICE_NAME}}-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean install -DskipTests -f {{SERVICE_NAME}}
      - name: Run Maven Test
        run: mvn test -f {{SERVICE_NAME}}
      - name: Detect test report files
        id: test_reports
        run: |
          if find {{SERVICE_NAME}} -type f -path '*-reports/TEST*.xml' | head -n 1 | grep -q .; then
            echo "has_reports=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Unit Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && steps.test_reports.outputs.has_reports == 'true' && (success() || failure()) }}
        with:
          name: Unit-Test-Results
          path: "{{SERVICE_NAME}}/**/surefire-reports/*.xml"
          reporter: java-junit
      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f {{SERVICE_NAME}}

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions
      - name: Get commit ID
        id: commit
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            COMMIT_ID=$(git rev-parse --short ${{ github.event.pull_request.head.sha }})
          else
            COMMIT_ID=$(git rev-parse --short ${{ github.sha }})
          fi
          echo "commit_id=${COMMIT_ID}" >> "$GITHUB_OUTPUT"
      - name: Build Maven package for Docker
        run: mvn clean package -DskipTests -pl {{SERVICE_NAME}} -am
      - name: Build Docker image (PR check)
        if: ${{ github.event_name == 'pull_request' }}
        uses: docker/build-push-action@v6
        with:
          context: ./{{SERVICE_NAME}}
          push: false
          tags: ghcr.io/devops-hcmus/yas-{{SERVICE_NAME}}:latest
      - name: Log in to Docker Hub
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      - name: Build and push Docker image to Docker Hub (all branches)
        if: ${{ github.event_name == 'push' }}
        uses: docker/build-push-action@v6
        with:
          context: ./{{SERVICE_NAME}}
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/yas-{{SERVICE_NAME}}:${{ steps.commit.outputs.commit_id }}
      - name: Build and push Docker image to Docker Hub (main branch with latest tag)
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
        uses: docker/build-push-action@v6
        with:
          context: ./{{SERVICE_NAME}}
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/yas-{{SERVICE_NAME}}:latest

  ci-pass:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: ${{ always() }}
    steps:
      - name: Verify all required jobs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "test=${{ needs.test.result }}, build=${{ needs.build.result }}"
            exit 1
          fi