          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backoffice
  namespace: yas-dev
  labels:
    app: backoffice
spec:
  type: NodePort
  ports:
  - port: 3000
    name: http
    nodePort: 30019
  selector:
    app: backoffice
---
# Sampledata Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sampledata
  namespace: yas-dev
  labels:
    app: sampledata
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sampledata
  template:
    metadata:
      labels:
        app: sampledata
    spec:
      containers:
      - name: sampledata
        image: giahuytech/yas-sampledata:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kube"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sampledata
  namespace: yas-dev
  labels:
    app: sampledata
spec:
  type: NodePort
  ports:
  - port: 8000
    name: http
    nodePort: 30020
  selector:
    app: sampledata
