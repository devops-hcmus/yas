apiVersion: v1
kind: Namespace
metadata:
  name: yas-dev
---
# Cart Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: yas-dev
  labels:
    app: cart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
    spec:
      containers:
      - name: cart
        image: giahuytech/yas-cart:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kube"
        - name: DATABASE_USERNAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: username
              optional: true
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
              optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: yas-dev
  labels:
    app: cart
spec:
  type: NodePort
  ports:
  - port: 8000
    name: http
    nodePort: 30001
  selector:
    app: cart
